<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements | Y-FLEX MO Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        /* Custom gradient for buttons - NOW GREEN/TEAL */
        .cta-gradient {
            background-image: linear-gradient(90deg, #10b981 0%, #2dd4bf 100%);
        }
        /* New Dark Theme Colors */
        .bg-dark-primary { background-color: #0A0A0A; } /* Near Black - Main Background */
        .bg-dark-card { background-color: #1A1A1A; } /* Slightly Lighter Dark Gray - Card Backgrounds */
        .text-light-100 { color: #f3f4f6; } /* Light Gray - Primary Text */
        .text-light-200 { color: #e5e7eb; } /* Lighter Gray - Secondary Text */
        .border-dark-light { border-color: #2a2a2a; } /* Dark Border for accents */
        
        /* Adjustments for the new sidebar layout */
        .grid-container {
            display: grid;
            grid-template-columns: 80px 1fr; /* Fixed sidebar width, rest for main content */
            min-height: 100vh;
        }

        /* Achievement Card specific shadow */
        .achieved-glow {
            box-shadow: 0 0 40px -5px rgba(16, 185, 129, 0.4);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'vibrant-green': '#10b981', /* Emerald 500 - Primary Green Accent */
                        'teal-accent': '#2dd4bf', /* Teal 400 - Secondary Green/Teal Accent */
                        'dark-bg-primary': '#0A0A0A',
                        'dark-card-bg': '#1A1A1A',
                        'dark-border': '#2a2a2a',
                        'dark-text-primary': '#f3f4f6',
                        'dark-text-secondary': '#a0a0a0',
                        'dark-hover': '#252525',
                        'dark-active-sidebar': '#10b981',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-primary text-dark-text-primary antialiased min-h-screen">

    <div class="grid-container">
        
        <aside class="w-20 bg-dark-card border-r border-dark-border flex flex-col items-center py-6 rounded-r-3xl">
            <a href="dashboard.html" class="mb-10 text-vibrant-green font-extrabold text-2xl">Y</a>
            <nav class="flex flex-col space-y-6">
                <a href="dashboard.html" class="p-2 rounded-xl text-dark-text-secondary hover:bg-dark-hover hover:text-vibrant-green transition duration-200" title="Dashboard">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                </a>
                <a href="challenges.html" class="p-2 rounded-xl text-dark-text-secondary hover:bg-dark-hover hover:text-vibrant-green transition duration-200" title="Challenges">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0114 0v-2.101a1 1 0 012 0v2.101a9.002 9.002 0 01-18 0v-2.101A1 1 0 014 2zm1 14a1 1 0 011-1h6a1 1 0 011 1v3a1 1 0 01-1 1H6a1 1 0 01-1-1v-3z" clip-rule="evenodd"></path></svg>
                </a>
                <a href="achievements.html" class="p-2 rounded-xl text-vibrant-green bg-vibrant-green/10" aria-current="page" title="Achievements">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm-7-8a7 7 0 1114 0 7 7 0 01-14 0zm7 4a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"></path></svg>
                </a>
                <a href="settings.html" class="p-2 rounded-xl text-dark-text-secondary hover:bg-dark-hover hover:text-vibrant-green transition duration-200" title="Settings">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.5 1.5 0 01-2.22 1.054l-1.47-1.12c-1.354-.952-3.076.671-2.005 2.005l1.12 1.47c-.295.4-.465.91-.465 1.455v.02c0 1.25.75 2.152 1.98 2.34c.34.053.64.217.845.454l.738.868a1.5 1.5 0 002.144 0l.738-.868c.205-.237.505-.4.845-.454 1.23-.188 1.98-1.09 1.98-2.34v-.02c0-.545-.17-1.055-.465-1.455l-1.12-1.47c1.07-.463 2.597-.107 2.98.0a1.5 1.5 0 011.054 2.22l-1.12 1.47c.4.295.91.465 1.455.465h.02c1.25 0 2.152-.75 2.34-1.98.053-.34.217-.64.454-.845l.868-.738a1.5 1.5 0 000-2.144l-.868-.738a1.5 1.5 0 00-.454-.845C17.25 4.75 16.34 4 15.09 4v-.02c-.545 0-1.055-.17-1.455-.465L13 2.455a1.5 1.5 0 00-2.22-1.054zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"></path></svg>
                </a>
            </nav>
            <div class="mt-auto">
                <button id="profile-initials-btn" class="w-10 h-10 rounded-full bg-teal-accent/50 text-dark-text-primary flex items-center justify-center font-bold text-sm hover:ring-2 ring-teal-accent transition" aria-label="User Profile Menu">
                    SK
                </button>
            </div>
        </aside>

        <div class="flex-1 p-6 lg:p-10 space-y-10">
            
            <header class="flex flex-col sm:flex-row justify-between items-center bg-dark-primary py-4">
                <div class="flex items-center w-full sm:w-auto mb-4 sm:mb-0">
                    <h1 class="text-3xl font-extrabold text-vibrant-green mr-4">Your Achievements 🏆</h1>
                </div>
                
                <div class="relative w-full sm:max-w-xs md:max-w-md">
                    <input type="text" placeholder="Search" class="w-full pl-10 pr-4 py-2 rounded-xl bg-dark-card border border-dark-border text-dark-text-primary placeholder-dark-text-secondary focus:ring-teal-accent focus:border-teal-accent text-sm">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-dark-text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </header>

            <div class="space-y-8">
                <div class="flex items-center justify-between">
                    <p class="text-dark-text-secondary text-lg">Total Badges Earned: <span id="badge-count" class="font-bold text-light-100">0</span></p>
                    <div class="relative">
                        <select id="filter-achievements" class="bg-dark-card border border-dark-border text-dark-text-primary text-sm rounded-lg focus:ring-teal-accent focus:border-teal-accent py-2 px-4">
                            <option value="all">Show All</option>
                            <option value="achieved">Achieved</option>
                            <option value="locked">Locked</option>
                        </select>
                    </div>
                </div>

                <div id="achievements-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-6">
                    </div>
            </div>

        </div>
    </div>
    
    <script src="achievements.js"></script>
</body>
</html>
